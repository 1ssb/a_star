# ============================================================
# query.cfg — Dynamic per-run configuration
#
# Updated before each run. Contains start/goal poses and obstacle
# poses that change between queries. Obstacle dimensions and
# environment settings are in planner.cfg.
#
# Format:  key = value   (# comments allowed)
# ============================================================

# ----------------------------------------------------------
# Start pose (floor frame, SE-2)
# ----------------------------------------------------------
start_x     = -0.8
start_y     = -0.8
start_theta = 1.5708

# ----------------------------------------------------------
# Goal pose (floor frame, SE-2)
# ----------------------------------------------------------
goal_x      = 0.5
goal_y      = 2.0
goal_theta  = 1.5708

# ----------------------------------------------------------
# Obstacle poses (position + orientation, updated per run)
#   Dimensions (length, width) defined in planner.cfg.
# ----------------------------------------------------------
obs.0.x      = 0.5
obs.0.y      = 0.5
obs.0.theta  = 0.5

obs.1.x      = 0.3
obs.1.y      = 1.2
obs.1.theta  = 1.5
