# ============================================================
# planner.cfg  —  SE(2) A* planner configuration
#
# Every geometric / grid / robot / obstacle parameter lives here.
# Edit this file instead of touching C++ source.
# Lines starting with '#' are comments.  Blank lines are ignored.
# Format:  key = value
# ============================================================

# ----------------------------------------------------------
# Map bounds (floor X-Y plane, metres)
# ----------------------------------------------------------
x_min   = -1.5
x_max   =  1.5
y_min   = -1.5
y_max   =  2.75

# ----------------------------------------------------------
# Grid resolution
# ----------------------------------------------------------
dx      = 0.2          # metres per cell in X
dy      = 0.2          # metres per cell in Y
n_theta = 8            # number of heading bins (uniform over 2π)

# ----------------------------------------------------------
# Robot geometry  (modelled as a circle)
# ----------------------------------------------------------
robot_radius = 0.5    # metres

# ----------------------------------------------------------
# Goal tolerance  (Euclidean distance, metres)
# ----------------------------------------------------------
goal_tol = 0.35

# ----------------------------------------------------------
# Start pose  (floor frame, SE-2)
# Ignored when --json is supplied (JSON values take precedence).
# ----------------------------------------------------------
start_x     = -0.8
start_y     = -0.8
start_theta = 1.5708

# ----------------------------------------------------------
# Goal pose  (floor frame, SE-2)
# ----------------------------------------------------------
goal_x      = 0.5
goal_y      = 2.0
goal_theta  = 1.5708

# ----------------------------------------------------------
# Obstacles  (oriented rectangles in floor frame)
#   Use obs.N.field  where N = 0, 1, 2, ...
#   Each obstacle needs: x, y, theta, length, width
#   Length = along obstacle local-x
#   Width  = along obstacle local-y
# ----------------------------------------------------------
obs.0.x      = 0.5
obs.0.y      = 0.5
obs.0.theta  = 0.5
obs.0.length = 0.35
obs.0.width  = 0.25

obs.1.x      = 0.3
obs.1.y      = 1.2
obs.1.theta  = 1.5
obs.1.length = 0.33
obs.1.width  = 0.08

safety_margin = 0.15   # extra inflation beyond robot_radius (≥ half grid step)

# ----------------------------------------------------------
# Start-pose offset (applied after planning)
#   offset = real_start − planned_start
# ----------------------------------------------------------
delta_x     = 0.0
delta_y     = 0.0
delta_theta = 0.0

# ----------------------------------------------------------
# Output
# ----------------------------------------------------------
traj_file = se2_path_floor.txt
