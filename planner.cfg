# ============================================================
# planner.cfg — Static planner configuration
#
# All environment and robot settings: map, grid, robot geometry,
# tolerances, obstacles. Loaded first; query.cfg overlays start/goal.
#
# Format:  key = value   (# comments allowed)
# ============================================================

# ----------------------------------------------------------
# Map bounds (floor X-Y plane, metres)
# ----------------------------------------------------------
x_min   = -1.5
x_max   =  1.5
y_min   = -1.5
y_max   =  2.75

# ----------------------------------------------------------
# Grid resolution
# ----------------------------------------------------------
dx      = 0.3         # metres per cell in X
dy      = 0.3         # metres per cell in Y
n_theta = 8            # number of heading bins (uniform over 2π)


# ----------------------------------------------------------
# Robot geometry (modelled as a circle)
# ----------------------------------------------------------
robot_radius = 0.2     # metres

# ----------------------------------------------------------
# Goal tolerance (Euclidean distance, metres)
# ----------------------------------------------------------
goal_tol = 0.25

# ----------------------------------------------------------
# Safety margin — extra inflation beyond robot_radius
# ----------------------------------------------------------
safety_margin = 0.05

# ----------------------------------------------------------
# Controller settings
# ----------------------------------------------------------
step_time = 1.0        # seconds per control step — velocity = displacement / step_time

# ----------------------------------------------------------
# Obstacle dimensions (fixed geometry, rarely changes)
#   obs.N.length, obs.N.width defined here.
#   obs.N.x, obs.N.y, obs.N.theta defined in query.cfg.
# ----------------------------------------------------------
obs.0.length = 0.25
obs.0.width  = 0.35

obs.1.length = 0.40
obs.1.width  = 0.58
