# ============================================================
# planner.cfg — Static planner configuration
#
# Settings that rarely change between runs. Loaded first.
# Dynamic per-run settings (start, goal, obstacles) go in query.cfg.
#
# Format:  key = value   (# comments allowed)
# ============================================================

# ----------------------------------------------------------
# Map bounds (floor X-Y plane, metres)
# ----------------------------------------------------------
x_min   = -1.5
x_max   =  1.5
y_min   = -1.5
y_max   =  2.75

# ----------------------------------------------------------
# Grid resolution
# ----------------------------------------------------------
dx      = 0.2          # metres per cell in X
dy      = 0.2          # metres per cell in Y
n_theta = 8            # number of heading bins (uniform over 2π)

# ----------------------------------------------------------
# Robot geometry (modelled as a circle)
# ----------------------------------------------------------
robot_radius = 0.5     # metres

# ----------------------------------------------------------
# Goal tolerance (Euclidean distance, metres)
# ----------------------------------------------------------
goal_tol = 0.35

# ----------------------------------------------------------
# Safety margin — extra inflation beyond robot_radius
# ----------------------------------------------------------
safety_margin = 0.15

# ----------------------------------------------------------
# Post-planning offset
#   offset = real_start − planned_start
# ----------------------------------------------------------
delta_x     = 0.0
delta_y     = 0.0
delta_theta = 0.0

# ----------------------------------------------------------
# Controller settings
# ----------------------------------------------------------
step_time = 2.0        # seconds per control step — velocity = displacement / step_time

# ----------------------------------------------------------
# Visualizer socket port
# ----------------------------------------------------------
viz_port = 9876
